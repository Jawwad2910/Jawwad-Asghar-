<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meridian Post — World News & Geopolitics</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0b; --surface:#111113; --accent:#e8c84a; --text:#f0efe8; --muted:#888890; --border:#222228;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
nav { background: rgba(10,10,11,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 5vw; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent); }
.hero { padding: 40px 5vw; border-bottom: 1px solid var(--border); }
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px 5vw; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: 0.3s; }
.card:hover { border-color: var(--accent); transform: translateY(-5px); }
.card-cat { color: var(--accent); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
.card-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 15px; line-height: 1.4; }
.read-btn { color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 700; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 4px; }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo"><span>M</span>eridian Post</a>
  <div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Editor: J. Asghar</div>
</nav>

<section class="hero text-center" id="hero">
  <h1 class="text-4xl md:text-6xl font-black mb-4" style="font-family: 'Playfair Display';">Global Intelligence Hub</h1>
  <p class="text-gray-500 max-w-2xl mx-auto">Real-time geopolitical analysis and world news curated for the strategic mind.</p>
</section>

<main class="news-grid" id="newsGrid">
  <div class="text-center col-span-full py-20 text-gray-600">Syncing with global feeds...</div>
</main>

<script>
async function fetchNews() {
  const container = document.getElementById('newsGrid');
  try {
    const res = await fetch('https://ok.surf/api/v1/cors/news-feed');
    const data = await res.json();
    container.innerHTML = '';

    // Combining World, Business and Tech news
    const articles = [...data.World, ...data.Business, ...data.Technology].slice(0, 12);

    articles.forEach(a => {
      container.innerHTML += `
        <div class="card">
          <div class="card-cat">Intelligence Update</div>
          <h2 class="card-title">${a.title}</h2>
          <div class="flex justify-between items-center mt-4">
            <a href="${a.link}" target="_blank" class="read-btn">Full Intel →</a>
            <span style="font-size: 0.6rem; color: #555;">Source: Global Feed</span>
          </div>
          <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #222; font-size: 0.7rem; font-style: italic; color: #888;">
            J. Asghar's Take: Monitoring for geopolitical shifts.
          </div>
        </div>
      `;
    });
  } catch (e) {
    container.innerHTML = '<div class="col-span-full text-center text-red-500">Satellite link failed. Please refresh.</div>';
  }
}
fetchNews();
</script>
</body>
</html>
